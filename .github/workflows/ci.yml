name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # CI 타임아웃 설정

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Upgrade pip and install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Sync dependencies (runtime + dev)
        run: |
          uv sync --group dev

      - name: Code formatting and linting
        run: |
          uv run ruff format --check .
          # Run linting
          uv run ruff check .

      - name: Type checking
        run: |
          uv run pyrefly check --ignore missing-attribute --ignore index-error --ignore not-a-type --ignore bad-argument-type --ignore bad-assignment --ignore bad-override --ignore unexpected-keyword --ignore bad-keyword-argument

      - name: Full test suite
        run: |
          uv run pytest

      - name: Security checks
        continue-on-error: true
        run: |
          # Vulnerability scan (continue on failure for now)
          uv run pip-audit --progress-spinner off || echo "⚠️ Security vulnerabilities found - please review"
          # Security static analysis
          uv run bandit -r app -x tests -ll || echo "⚠️ Security issues found - please review"
